runConfig:
  cpu: 2
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_PLATFORM_NAME
    value: e-BGX
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_PLATFORM_FEE_PERCENT
    value: "1"
    availability:
      - BUILD
      - RUNTIME
